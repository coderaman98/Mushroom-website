<!DOCTYPE html>
<html>
<head>
<title>Shop</title>

<style>
body { font-family:Arial; margin:0; background:#f1f3f6; }

/* Header */
.header {
    background:#1b4332;
    color:white;
    padding:15px;
    text-align:center;
}

/* Back Button */
.back-btn {
    margin:15px;
    padding:10px 20px;
    background:#1b4332;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

/* Products Grid */
.products {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.product {
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

img {
    width:100%;
    border-radius:10px;
}

button.buy {
    padding:10px;
    background:#fb641b;
    color:white;
    border:none;
    cursor:pointer;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<h2>🛒 Our Products</h2>
</div>

<button class="back-btn" onclick="window.location.href='index.html'">⬅ Back to Home</button>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1518972559570-7cc1309f3229">
<h3>Button Mushroom</h3>
<p>₹120</p>
<button class="buy">Buy Now</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1604908176997-4310e5d6c6c2">
<h3>Oyster Mushroom</h3>
<p>₹150</p>
<button class="buy">Buy Now</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1585238342024-78d387f4a707">
<h3>Premium Mushroom</h3>
<p>₹180</p>
<button class="buy">Buy Now</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1572441710534-6807c39f0a7b">
<h3>Fresh Pack</h3>
<p>₹100</p>
<button class="buy">Buy Now</button>
</div>

</div>

</body>
</html>
